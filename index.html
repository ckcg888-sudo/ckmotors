<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#17324d"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="ซี.เค มอเตอร์"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="app-icon.svg"><title>บันทึกหมายเลขเครื่องยนต์ร้าน ซี.เค มอเตอร์</title><style>
:root{--n:#17324d;--b:#2474b5;--l:#dce6ed;--r:#b63840}*{box-sizing:border-box}body{margin:0;background:#f4f7f9;color:#17242e;font-family:Tahoma,sans-serif}header{background:linear-gradient(130deg,#142f48,#24658f);color:#fff;padding:22px 18px}header h1{font-size:21px;margin:0 0 5px}header p{margin:0;color:#dceaf4;font-size:13px}main{max-width:900px;margin:auto;padding:16px}.card{background:#fff;border:1px solid var(--l);border-radius:14px;padding:17px;margin-bottom:14px;box-shadow:0 3px 15px #17324d0d}h2{font-size:17px;margin:0 0 15px;color:var(--n)}label{display:block;font-size:13px;font-weight:bold;margin-bottom:6px}.field{margin-bottom:13px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,textarea{width:100%;border:1px solid #c8d5de;border-radius:9px;padding:11px;font:inherit;font-size:16px}textarea{min-height:65px}button{border:0;border-radius:9px;padding:10px 13px;font:inherit;font-weight:bold}.primary{background:var(--b);color:#fff}.secondary{background:#e9f0f4;color:var(--n)}.danger{background:#fae9ea;color:var(--r)}.actions,.toolbar{display:flex;gap:8px}.toolbar{margin-bottom:12px}.toolbar input{flex:1}.summary{background:#eef5fa;padding:10px 12px;border-radius:9px;margin-bottom:12px;color:var(--n)}.item{border-top:1px solid #e3ebf0;padding:13px 0}.item:first-child{border-top:0}.engine{font-weight:bold;color:var(--n);font-size:16px}.muted{color:#70808b;font-size:12px}.itembuttons{margin-top:8px}.empty{text-align:center;color:#75848e;padding:25px}.note{font-size:11px;color:#73828c;margin-top:10px}@media(max-width:620px){.row{grid-template-columns:1fr}.toolbar{flex-wrap:wrap}.toolbar input{flex-basis:100%}body{padding-bottom:env(safe-area-inset-bottom)}}
</style></head><body><header><h1>บันทึกหมายเลขเครื่องยนต์ร้าน ซี.เค มอเตอร์</h1><p>บันทึกและค้นหารายการซื้อเข้าอย่างเป็นระบบ</p></header><main><section class="card"><h2 id="formTitle">เพิ่มรายการซื้อเข้า</h2><form id="form"><div class="field"><label>หมายเลขเครื่องยนต์ *</label><input id="engine" required placeholder="เช่น 4JJ1-ABC1234"></div><div class="row"><div class="field"><label>วันที่ซื้อเข้า *</label><input id="date" type="date" required></div><div class="field"><label>ราคาซื้อ (บาท)</label><input id="price" type="number" min="0" step="0.01"></div></div><div class="row"><div class="field"><label>ยี่ห้อ</label><input id="brand"></div><div class="field"><label>รุ่น</label><input id="model"></div></div><div class="field"><label>ชื่อผู้ขาย / แหล่งที่ซื้อ</label><input id="seller"></div><div class="field"><label>เบอร์โทรผู้ขาย</label><input id="phone" type="tel"></div><div class="field"><label>หมายเหตุ</label><textarea id="note"></textarea></div><div class="actions"><button class="primary" type="submit" id="save">บันทึกรายการ</button><button class="secondary" type="button" id="clear">ล้างข้อมูล</button></div></form><div class="note">ข้อมูลเก็บอยู่ใน iPhone เครื่องนี้ ควรส่งออกไฟล์สำรองเป็นประจำ</div></section><section class="card"><h2>รายการทั้งหมด</h2><div class="summary">จำนวน <b id="count">0</b> รายการ · ยอดซื้อรวม <b id="total">฿0.00</b></div><div class="toolbar"><input id="search" type="search" placeholder="ค้นหาหมายเลข ยี่ห้อ รุ่น หรือผู้ขาย"><button class="secondary" id="export" type="button">ส่งออก CSV</button></div><div id="list"></div></section></main><script>
const K='ckmotor.engine.records.v1',F=['engine','date','price','brand','model','seller','phone','note'];let edit=null;const $=x=>document.getElementById(x),load=()=>{try{return JSON.parse(localStorage.getItem(K))||[]}catch{return[]}},store=x=>localStorage.setItem(K,JSON.stringify(x)),safe=x=>String(x||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),money=x=>new Intl.NumberFormat('th-TH',{style:'currency',currency:'THB'}).format(+x||0);function reset(){edit=null;$('form').reset();$('date').value=new Date().toLocaleDateString('en-CA');$('formTitle').textContent='เพิ่มรายการซื้อเข้า';$('save').textContent='บันทึกรายการ'}function render(){let a=load(),q=$('search').value.toLowerCase(),v=a.filter(r=>F.some(f=>String(r[f]||'').toLowerCase().includes(q))).sort((a,b)=>b.date.localeCompare(a.date));$('count').textContent=a.length;$('total').textContent=money(a.reduce((s,r)=>s+(+r.price||0),0));$('list').innerHTML=v.length?v.map(r=>`<div class="item"><div class="engine">${safe(r.engine)}</div><div>${safe([r.brand,r.model].filter(Boolean).join(' / ')||'-')}</div><div class="muted">${safe(r.date)} · ${safe(r.seller||'-')} · ${money(r.price)}</div>${r.note?`<div class="muted">${safe(r.note)}</div>`:''}<div class="itembuttons"><button class="secondary" onclick="editing('${r.id}')">แก้ไข</button> <button class="danger" onclick="del('${r.id}')">ลบ</button></div></div>`).join(''):'<div class="empty">ยังไม่มีรายการ</div>'}$('form').onsubmit=e=>{e.preventDefault();let a=load(),d=Object.fromEntries(F.map(f=>[f,$(f).value.trim()]));if(a.some(r=>r.engine.toLowerCase()===d.engine.toLowerCase()&&r.id!==edit)&&!confirm('หมายเลขนี้มีอยู่แล้ว ต้องการบันทึกซ้ำหรือไม่?'))return;if(edit){let i=a.findIndex(r=>r.id===edit);a[i]={...a[i],...d}}else a.push({...d,id:crypto.randomUUID()});store(a);reset();render()};window.editing=id=>{let r=load().find(x=>x.id===id);edit=id;F.forEach(f=>$(f).value=r[f]||'');$('formTitle').textContent='แก้ไขรายการ';$('save').textContent='บันทึกการแก้ไข';scrollTo({top:0,behavior:'smooth'})};window.del=id=>{if(confirm('ยืนยันการลบรายการนี้?')){store(load().filter(r=>r.id!==id));render()}};$('clear').onclick=reset;$('search').oninput=render;$('export').onclick=()=>{let a=load();if(!a.length)return alert('ยังไม่มีข้อมูล');let rows=[['วันที่','หมายเลขเครื่องยนต์','ยี่ห้อ','รุ่น','ผู้ขาย','เบอร์โทร','ราคาซื้อ','หมายเหตุ'],...a.map(r=>[r.date,r.engine,r.brand,r.model,r.seller,r.phone,r.price,r.note])],csv='\ufeff'+rows.map(x=>x.map(y=>'"'+String(y||'').replace(/"/g,'""')+'"').join(',')).join('\r\n'),link=document.createElement('a');link.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));link.download='CK-Motor_'+new Date().toLocaleDateString('en-CA')+'.csv';link.click()};if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js'));reset();render();
</script></body></html>
